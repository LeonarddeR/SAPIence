name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  style:
    name: Check Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  build:
    name: Build (${{ matrix.suffix }})
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: i686-pc-windows-msvc
            suffix: x86
          - target: x86_64-pc-windows-msvc
            suffix: x64
          - target: aarch64-pc-windows-msvc
            suffix: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: build-${{ matrix.suffix }}

      - name: Install cargo-edit
        if: startsWith(github.ref, 'refs/tags/v')
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-edit

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: cargo set-version "${GITHUB_REF_NAME#v}"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sapience-${{ matrix.suffix }}
          compression-level: 9
          path: |
            target/${{ matrix.target }}/release/*.dll
            target/${{ matrix.target }}/release/*.dll.lib
            target/${{ matrix.target }}/release/*.pdb

  test:
    name: Test (${{ matrix.suffix }})
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: i686-pc-windows-msvc
            suffix: x86
            runner: windows-2025
          - target: x86_64-pc-windows-msvc
            suffix: x64
            runner: windows-2025
          - target: aarch64-pc-windows-msvc
            suffix: arm64
            runner: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.suffix }}

      - name: Download DLL artifact
        uses: actions/download-artifact@v4
        with:
          name: sapience-${{ matrix.suffix }}
          path: dll

      - name: Run tests
        env:
          SAPIENCE_DLL_PATH: ${{ github.workspace }}/dll/sapience.dll
        run: cargo test --features test-hooks --target ${{ matrix.target }}

  release:
    name: Release
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble release zip
        run: |
          set -euo pipefail
          mkdir -p release
          for suffix in x86 x64 arm64; do
            src="artifacts/sapience-${suffix}"
            [ -d "$src" ] || { echo "Missing artifact: $src" >&2; exit 1; }
            mv "$src" "release/${suffix}"
          done
          cd release
          zip -r -9 "../sapience-${GITHUB_REF_NAME}.zip" .

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: sapience-*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
          name: ${{ github.ref_name }}
