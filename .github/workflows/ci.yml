name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  style:
    name: Check Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  matrix:
    name: Define matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          echo 'matrix={"include":[{"target":"i686-pc-windows-msvc","suffix":"x86","runner":"windows-2025"},{"target":"x86_64-pc-windows-msvc","suffix":"x64","runner":"windows-2025"},{"target":"aarch64-pc-windows-msvc","suffix":"arm64","runner":"windows-11-arm"}]}' >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.suffix }})
    needs: matrix
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.suffix }}

      - name: Install cargo-edit
        if: startsWith(github.ref, 'refs/tags/v')
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-edit

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: cargo set-version "${GITHUB_REF_NAME#v}"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: sapience-${{ matrix.suffix }}
          compression-level: 9
          path: |
            target/${{ matrix.target }}/release/*.dll
            target/${{ matrix.target }}/release/*.dll.lib
            target/${{ matrix.target }}/release/*.pdb

  test:
    name: Test (${{ matrix.suffix }})
    needs: matrix
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.suffix }}

      - name: Build DLL
        run: cargo build --features test-hooks --target ${{ matrix.target }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run tests
        run: cargo nextest run --features test-hooks --target ${{ matrix.target }} --profile ci

      - name: Publish test report
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: target/nextest/ci/junit.xml
          check_name: Tests (${{ matrix.suffix }})
          detailed_summary: true
          include_passed: false
          annotate_only: false
          require_tests: true

  build_addon:
    name: Build add-on
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gettext

      - name: Install Python dependencies
        run: uv sync

      - name: Download x64 DLLs
        uses: actions/download-artifact@v8
        with:
          name: sapience-x64
          path: addon/dll/x64

      - name: Download x86 DLLs
        uses: actions/download-artifact@v8
        with:
          name: sapience-x86
          path: addon/dll/x86

      - name: Strip non-DLL files from artifact payload
        run: |
          set -euo pipefail
          for arch in x64 x86; do
            find "addon/dll/${arch}" -mindepth 1 -maxdepth 1 \
              ! -name 'sapience.dll' ! -name 'nvdaControllerClient.dll' \
              -delete
          done
          ls -lR addon/dll

      - name: Set addon version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/addon_version=\"[^\"]*\"/addon_version=\"${VERSION}\"/" buildVars.py
          grep -F "addon_version=\"${VERSION}\"" buildVars.py

      - name: Lint
        run: uv run ruff check --fix

      - name: Format
        run: uv run ruff format --check

      - name: Build add-on
        run: uv run scons && uv run scons pot

      - uses: actions/upload-artifact@v7
        with:
          name: packaged_addon
          path: ./*.nvda-addon
          compression-level: 9

      - uses: actions/upload-artifact@v7
        with:
          name: translation_template
          path: ./*.pot
          compression-level: 9

  release:
    name: Release
    needs: [build, test, build_addon]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Assemble Rust release zip
        run: |
          set -euo pipefail
          mkdir -p release
          for suffix in x86 x64 arm64; do
            src="artifacts/sapience-${suffix}"
            [ -d "$src" ] || { echo "Missing artifact: $src" >&2; exit 1; }
            mv "$src" "release/${suffix}"
          done
          (cd release && zip -r -9 "../sapience-${GITHUB_REF_NAME}.zip" .)

      - name: Stage addon + pot artifacts
        run: |
          set -euo pipefail
          mv artifacts/packaged_addon/*.nvda-addon .
          mv artifacts/translation_template/*.pot .

      - name: Append SHA256 of .nvda-addon to changelog
        run: |
          set -euo pipefail
          printf '\nSHA256:\n' >> changelog.md
          sha256sum *.nvda-addon >> changelog.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            sapience-*.zip
            *.nvda-addon
            *.pot
          body_path: changelog.md
          generate_release_notes: true
          fail_on_unmatched_files: true
          name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref, '-') }}
